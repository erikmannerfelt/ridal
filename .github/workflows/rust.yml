name: Rust

on:
  push:
    branches: [main]
    tags:
    - v*
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt update -y
        sudo apt install -y gdal-bin proj-bin

    - name: Install dependencies (Windows GDAL + PROJ via OSGeo4W)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $installer = "$env:RUNNER_TEMP\osgeo4w-setup.exe"

        Invoke-WebRequest `
          -Uri "https://download.osgeo.org/osgeo4w/v2/osgeo4w-setup.exe" `
          -OutFile $installer

        & $installer `
          -q -k -r -A `
          -s "https://download.osgeo.org/osgeo4w/v2/" `
          -P gdal,proj

        "C:\OSGeo4W\bin" >> $env:GITHUB_PATH
        "PROJ_LIB=C:\OSGeo4W\share\proj" >> $env:GITHUB_ENV

    - name: Verify GDAL/PROJ (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        gdalinfo --version
        ogr2ogr --help | Out-Null
        proj

    - name: Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Formatting
      if: runner.os == 'Linux'
      run: cargo fmt --check

    - name: Linting
      if: runner.os == 'Linux'
      run: cargo clippy --bin ridal -- -D warnings --no-deps

    - name: Build
      run: cargo build --bin ridal --verbose

    - name: Test
      run: cargo test --bin ridal -- --nocapture

    - name: Dry-run cargo publish
      if: runner.os == 'Linux' && !startsWith(github.ref, 'refs/tags/')
      run: cargo publish --dry-run

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Publish crate
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      run: cargo publish
